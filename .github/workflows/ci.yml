name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bunx biome ci packages/orm/src/ packages/auth/src packages/docs/src packages/migrate/src apps/

      - name: Build
        run: bun run build

      - name: Type check
        run: bun run typecheck

      - name: Run tests
        run: NODE_ENV=test mkdir -p .tmp && bun test
