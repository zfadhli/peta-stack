name: Publish
on:
  push:
    tags:
      - 'peta-orm@*'
      - 'peta-auth@*'
      - 'peta-docs@*'
      - 'peta-migrate@*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. peta-orm@0.4.1)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Parse tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          PACKAGE=${TAG%@*}
          VERSION=${TAG#*@}
          echo "package=$PACKAGE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # Map npm package name to directory
          case "$PACKAGE" in
            peta-orm) DIR="orm" ;;
            peta-auth) DIR="auth" ;;
            peta-docs) DIR="docs" ;;
            peta-migrate) DIR="migrate" ;;
          esac
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all packages
        run: bun run build

      - name: Publish ${{ steps.tag.outputs.package }}
        run: npm publish -w packages/${{ steps.tag.outputs.dir }} --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.tag.outputs.package }} v${{ steps.tag.outputs.version }}
          generate_release_notes: true
